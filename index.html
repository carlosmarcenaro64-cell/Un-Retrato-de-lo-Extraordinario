<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lissette Alexandra: El Libro Abierto</title>
    <style>
        :root {
            --paper: #fdfaf0;
            --ink: #1a1a1a;
            --line: #2c2c2c;
        }

        body {
            background-color: #e0d8c3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        /* Estructura de Libro Abierto */
        .book-frame {
            position: relative;
            width: 95%;
            max-width: 900px;
            height: 550px;
            background: var(--paper);
            border: 3px solid var(--line);
            display: flex;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            /* Sombra central para simular el pliegue */
            background-image: linear-gradient(to right, transparent 48%, rgba(0,0,0,0.1) 49%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.1) 51%, transparent 52%);
        }

        .page {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .page-left { border-right: 1px solid rgba(0,0,0,0.05); }

        h2 { color: #8b0000; font-size: 1.3rem; text-align: center; margin-bottom: 20px; }
        p { line-height: 1.7; text-align: justify; font-size: 1rem; color: var(--ink); }

        /* Controles de navegación */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background: var(--line);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #444; transform: scale(1.05); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .page-counter { font-size: 0.9rem; color: #666; font-weight: bold; }

        @media (max-width: 768px) {
            .book-frame { flex-direction: column; height: auto; background-image: none; border: none; box-shadow: none; background: transparent; }
            .page { background: var(--paper); border: 2px solid var(--line); margin-bottom: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        }
    </style>
</head>
<body>

    <div class="book-frame">
        <div class="page page-left" id="left">
            </div>
        <div class="page page-right" id="right">
            </div>
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="changePage(-2)">Atrás</button>
        <span class="page-counter" id="counter">Páginas 1-2</span>
        <button class="btn" id="nextBtn" onclick="changePage(2)">Siguiente</button>
    </div>

<script>
    const bookData = [
        { t: "Lissette Alexandra", c: "<h1>Un Retrato de lo Extraordinario</h1><p style='text-align:center'>Manual de un Guardián sobre la belleza de lo auténtico.</p><p style='text-align:center; margin-top:40px'>Escrito por: Carlos Marcenaro</p>" },
        { t: "Dedicatoria", c: "<p><i>Para la niña de la sonrisa de plata y los ojos que recargan mi alma.</i></p><p>Este libro no es una historia terminada pero es el mapa de lo mucho que significas para mí y espero poder lograr demostrar lo especial que eres bombón.</p>" },
        { t: "Carta de Intención", c: "<p>Hola Lis, este es mi primer libro formal. He decidido escribir este intento de libro porque las palabras dichas se las lleva el viento, pero lo que se escribe queda guardado en el tiempo.</p>" },
        { t: "Mi Promesa", c: "<p>Quise que tuvieras algo tuyo, donde pudieras leer en los días difíciles lo mucho que te admiro. No soy escritor, pero sí soy un hombre que te observa y te escucha con detenimiento.</p>" },
        { t: "Capítulo 1", c: "<h3>La Geografía de lo Genuino</h3><p>Tu valor no es una cifra negociable. Vales billones por esa humanidad sentimental que te desborda y por tu terquedad que es, en realidad, una brújula propia.</p>" },
        { t: "Belleza Real", c: "<p>Si el mundo insiste en la perfección, yo te digo que la tuya es la belleza de la realidad. Esas espinillas son solo pequitas de vida que te hacen humana. Te ves hermosa.</p>" },
        { t: "Capítulo 2", c: "<h3>Medicina de las Mañanas</h3><p>Despertar y encontrar un mensaje de buenos días tuyo es la chispa que hace que la jornada cobre sentido. Esos abrazos de la mañana son mi medicina y mi vitamina.</p>" },
        { t: "Rituales", c: "<p>Ir al gimnasio o salir a comer son mis rituales favoritos porque disfruto de tu presencia. Gracias por permitirme ser quien te cuida y te ayuda día a día.</p>" },
        { t: "Capítulo 3", c: "<h3>Resiliencia</h3><p>Hemos superado problemas que a otros los habrían hecho rendirse. Tu capacidad de levantarte es impresionante. Juntos somos, simplemente, mejores.</p>" },
        { t: "Capítulo 4", c: "<h3>Planes Futuros</h3><p>Guatemala, la Puerta del Diablo, el Karaoke y el Skydeck. Estaré ahí para sostenerte y ser tu fan número uno mientras cantamos como profesionales.</p>" },
        { t: "Capítulo 5", c: "<h3>El Cuidado</h3><p>Mi mente no descansa hasta que sé que estás en casa. Mi cuidado por ti no conoce horarios; estoy pendiente de cada cosa que necesites, hoy y siempre.</p>" },
        { t: "Epílogo", c: "<h3>Siempre Tú</h3><p>Eres mi niña preciosa, mi compañera de batallas y mi gymcrush. Gracias por dejarme ser parte de tu mundo. Te quiero demasiado, mi Lis.</p>" }
    ];

    let current = 0;

    function render() {
        document.getElementById('left').innerHTML = `<h2>\${bookData[current].t}</h2>\${bookData[current].c}`;
        
        if(current + 1 < bookData.length) {
            document.getElementById('right').innerHTML = `<h2>\${bookData[current+1].t}</h2>\${bookData[current+1].c}`;
        } else {
            document.getElementById('right').innerHTML = "<div style='display:flex; height:100%; align-items:center; justify-content:center; font-size:4rem'>❦</div>";
        }

        document.getElementById('counter').innerText = `Páginas \${current + 1}-\${current + 2}`;
        document.getElementById('prevBtn').disabled = current === 0;
        document.getElementById('nextBtn').disabled = current + 2 >= bookData.length;
    }

    function changePage(offset) {
        current += offset;
        render();
    }

    render();
</script>
</body>
</html>
